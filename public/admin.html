<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>商品管理</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Admin Products</p>
        <h1>商品管理</h1>
      </div>
      <nav class="header-actions">
        <a class="admin-link is-current" href="/admin.html">我的商品</a>
        <a class="admin-link" href="/admin-market.html">賣場設定</a>
        <a class="admin-link" href="/admin-categories.html">分類管理</a>
        <a class="admin-link" href="/admin-stats.html">數據統計</a>
        <a class="admin-link" href="/admin-chat.html">買家聊聊</a>
        <a class="admin-link" href="/admin-tools.html">匯入同步</a>
        <a class="admin-link" href="/admin-orders.html">訂單後台</a>
        <a class="admin-link" href="/">下單頁</a>
        <button type="button" id="logoutButton">登出</button>
      </nav>
    </header>

    <main class="admin-main">
      <section id="productCreateSection" class="admin-grid hidden">
        <section class="editor-panel product-create-panel">
          <div class="product-edit-navigation">
            <button type="button" class="secondary-button" data-back-product-list>返回商品列表</button>
            <span>獨立新增商品頁面</span>
          </div>
          <h2>新增商品</h2>
          <form id="productForm" class="order-form">
            <label>
              分類
              <select name="categoryId" required></select>
            </label>
            <label>
              商品名稱
              <input name="name" placeholder="例如 雲朵厚底拖鞋" required>
            </label>
            <label>
              商品圖片
              <span class="image-uploader">
                <span class="image-preview empty" data-image-preview>尚未上傳</span>
                <input type="file" name="imageFile" accept="image/*">
                <input type="hidden" name="imageUrl">
                <button type="button" data-clear-image>刪除圖片</button>
              </span>
            </label>
            <label>
              商品說明
              <textarea name="description" rows="3"></textarea>
            </label>
            <div id="newVariants" class="variant-editor"></div>
            <button type="button" data-add-variant>新增品項</button>
            <button type="submit">新增商品</button>
          </form>
        </section>
      </section>

      <section id="productListSection">
        <div class="section-head">
          <h2>商品資料</h2>
          <button type="button" id="refreshCatalog">重新整理</button>
        </div>
        <div class="admin-product-searchbar">
          <label>
            搜尋商品
            <input id="productSearchInput" type="search" placeholder="搜尋商品名稱、貨號、品項條碼">
          </label>
          <button type="button" id="productSearchButton">搜尋</button>
          <button type="button" id="productSearchReset" class="secondary-button">重設</button>
        </div>
        <p id="productListCount" class="product-list-count"></p>
        <div id="catalogEditor" class="catalog-editor"></div>
      </section>
    </main>

    <script src="/admin-common.js"></script>
    <script src="/admin.js"></script>
  </body>
</html>
